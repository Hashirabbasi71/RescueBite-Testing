[pytest]
testpaths = tests unit_tests selenium_tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    positive: positive / happy-path test cases
    negative: negative / error-path test cases
    boundary: boundary / edge-value test cases
    security: security and injection test cases
    performance: response-time test cases
    selenium: Selenium WebDriver GUI tests
    playwright: Playwright browser tests
